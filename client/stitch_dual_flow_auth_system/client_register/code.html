<style>
        .auth-card-shadow {
            box-shadow: 0 20px 40px -5px rgba(53, 37, 205, 0.08);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 2px solid #fff;
            width: 18px;
            height: 18px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

<body class="bg-surface-bright text-on-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col">
<header class="w-full top-0 border-b border-outline-variant dark:border-outline bg-surface dark:bg-background h-16 sticky z-50">
<div class="flex justify-between items-center h-16 px-md md:px-xl w-full max-w-7xl mx-auto">
<div class="flex items-center gap-xs">
<span class="text-headline-md font-headline-md font-bold text-primary dark:text-primary-fixed-dim">SecurityFlow</span>
</div>
<div class="flex items-center gap-md">
<button class="text-on-surface-variant hover:text-primary transition-colors cursor-pointer active:opacity-70 flex items-center gap-xs">
<span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
<span class="font-label-md text-label-md hidden md:block">Support</span>
</button>
</div>
</div>
</header>
<main class="flex-grow flex items-center justify-center p-md md:p-xl">
<!-- Abstract Background Decoration -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary-container/10 rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 -right-24 w-[32rem] h-[32rem] bg-secondary-container/10 rounded-full blur-3xl"></div>
</div>
<div class="w-full max-w-[480px] bg-white rounded-xl auth-card-shadow p-lg md:p-xl z-10 fade-in border border-surface-variant/30">
<div class="text-center mb-lg">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-xs">Create an Account</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Join SecurityFlow and protect what matters.</p>
</div>
<form class="space-y-md" id="registrationForm" novalidate="">
<!-- Name Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="name">Full Name</label>
<div class="relative group">
<input class="w-full px-md py-md bg-surface-container-low border-transparent border-2 rounded-lg font-body-md text-body-md focus:outline-none focus:border-primary focus:bg-white transition-all placeholder:text-outline" id="name" name="name" placeholder="John Doe" type="text"/>
</div>
<p class="font-label-sm text-label-sm text-error hidden" id="nameError"></p>
</div>
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Email Address</label>
<div class="relative group">
<input class="w-full px-md py-md bg-surface-container-low border-transparent border-2 rounded-lg font-body-md text-body-md focus:outline-none focus:border-primary focus:bg-white transition-all placeholder:text-outline" id="email" name="email" placeholder="john@example.com" type="email"/>
</div>
<p class="font-label-sm text-label-sm text-error hidden" id="emailError"></p>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<div class="relative group">
<input class="w-full px-md py-md bg-surface-container-low border-transparent border-2 rounded-lg font-body-md text-body-md focus:outline-none focus:border-primary focus:bg-white transition-all placeholder:text-outline" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface-variant transition-colors p-1" onclick="togglePassword('password')" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
<p class="font-label-sm text-label-sm text-error hidden" id="passwordError"></p>
</div>
<!-- Confirm Password Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="confirm_password">Confirm Password</label>
<div class="relative group">
<input class="w-full px-md py-md bg-surface-container-low border-transparent border-2 rounded-lg font-body-md text-body-md focus:outline-none focus:border-primary focus:bg-white transition-all placeholder:text-outline" id="confirm_password" name="confirm_password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface-variant transition-colors p-1" onclick="togglePassword('confirm_password')" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
<p class="font-label-sm text-label-sm text-error hidden" id="confirmPasswordError"></p>
</div>
<!-- Validation Indicators (Zod/Ant style) -->
<ul class="py-sm space-y-xs">
<li class="flex items-center gap-xs text-on-surface-variant font-body-sm text-body-sm transition-colors" id="req-length">
<span class="material-symbols-outlined text-[16px]" data-icon="circle">circle</span>
                        At least 8 characters
                    </li>
<li class="flex items-center gap-xs text-on-surface-variant font-body-sm text-body-sm transition-colors" id="req-char">
<span class="material-symbols-outlined text-[16px]" data-icon="circle">circle</span>
                        One special character or number
                    </li>
</ul>
<!-- Sign Up Button -->
<button class="w-full h-[52px] bg-primary-container text-on-primary hover:bg-primary transition-all active:scale-[0.98] rounded-lg font-label-md text-label-md flex items-center justify-center gap-sm mt-lg" id="submitBtn" type="submit">
<span id="btnText">Sign Up</span>
<div class="spinner hidden" id="btnSpinner"></div>
</button>
</form>
<div class="mt-xl text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Already have an account? 
                    <a class="text-primary font-label-md text-label-md hover:underline decoration-2 underline-offset-4" href="#">Log In</a>
</p>
</div>
</div>
</main>
<footer class="mt-auto py-lg px-md w-full">
<div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-md opacity-60">
<div class="font-body-sm text-body-sm">© 2024 SecurityFlow Inc. All rights reserved.</div>
<div class="flex gap-lg font-label-sm text-label-sm">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="hover:text-primary transition-colors" href="#">Cookie Policy</a>
</div>
</div>
</footer>
<script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            const icon = input.nextElementSibling.querySelector('.material-symbols-outlined');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        const form = document.getElementById('registrationForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');

        // Simple Validation Logic
        const validateInput = (input, errorEl, message) => {
            if (!input.value.trim()) {
                errorEl.textContent = message;
                errorEl.classList.remove('hidden');
                input.classList.add('border-error');
                input.classList.remove('focus:border-primary');
                return false;
            } else {
                errorEl.classList.add('hidden');
                input.classList.remove('border-error');
                input.classList.add('focus:border-primary');
                return true;
            }
        };

        const validateEmail = (input, errorEl) => {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!re.test(input.value)) {
                errorEl.textContent = "Please enter a valid email address.";
                errorEl.classList.remove('hidden');
                input.classList.add('border-error');
                return false;
            }
            errorEl.classList.add('hidden');
            input.classList.remove('border-error');
            return true;
        };

        // Real-time validation for password rules
        document.getElementById('password').addEventListener('input', (e) => {
            const val = e.target.value;
            const reqLength = document.getElementById('req-length');
            const reqChar = document.getElementById('req-char');

            if (val.length >= 8) {
                reqLength.classList.replace('text-on-surface-variant', 'text-tertiary-container');
                reqLength.querySelector('span').textContent = 'check_circle';
                reqLength.querySelector('span').style.fontVariationSettings = "'FILL' 1";
            } else {
                reqLength.classList.replace('text-tertiary-container', 'text-on-surface-variant');
                reqLength.querySelector('span').textContent = 'circle';
                reqLength.querySelector('span').style.fontVariationSettings = "'FILL' 0";
            }

            if (/[0-9!@#$%^&*]/.test(val)) {
                reqChar.classList.replace('text-on-surface-variant', 'text-tertiary-container');
                reqChar.querySelector('span').textContent = 'check_circle';
                reqChar.querySelector('span').style.fontVariationSettings = "'FILL' 1";
            } else {
                reqChar.classList.replace('text-tertiary-container', 'text-on-surface-variant');
                reqChar.querySelector('span').textContent = 'circle';
                reqChar.querySelector('span').style.fontVariationSettings = "'FILL' 0";
            }
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            let isValid = true;
            isValid = validateInput(document.getElementById('name'), document.getElementById('nameError'), "Full name is required.") && isValid;
            isValid = validateEmail(document.getElementById('email'), document.getElementById('emailError')) && isValid;
            isValid = validateInput(document.getElementById('password'), document.getElementById('passwordError'), "Password is required.") && isValid;
            
            const pass = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirm_password').value;
            
            if (pass !== confirmPass) {
                const err = document.getElementById('confirmPasswordError');
                err.textContent = "Passwords do not match.";
                err.classList.remove('hidden');
                document.getElementById('confirm_password').classList.add('border-error');
                isValid = false;
            } else {
                document.getElementById('confirmPasswordError').classList.add('hidden');
            }

            if (isValid) {
                // Trigger Loading State
                submitBtn.disabled = true;
                btnText.classList.add('hidden');
                btnSpinner.classList.remove('hidden');

                // Simulate API call
                setTimeout(() => {
                    alert('Registration submitted successfully! This is a demo interaction.');
                    submitBtn.disabled = false;
                    btnText.classList.remove('hidden');
                    btnSpinner.classList.add('hidden');
                }, 2000);
            }
        });
    </script>
</body></html>
