<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

                        "on-secondary-fixed": "#0d1c2f",
                        "secondary": "#515f74",
                        "secondary-container": "#d5e3fd",

                        "on-primary-container": "#dad7ff",
                        "on-surface-variant": "#464555",
                        "on-tertiary-fixed-variant": "#7b2f00",
                        "surface-container-highest": "#e4e1ee",
                        "secondary-fixed": "#d5e3fd",
                        "primary-fixed": "#e2dfff",
                        "on-primary": "#ffffff",
                        "surface-container-high": "#eae6f4",

                        "background": "#fcf8ff",

                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "16px",
                        "3xl": "64px",
                        "lg": "24px",
                        "xs": "4px",
                        "sm": "8px",
                        "2xl": "48px",
                        "xl": "32px"
                    },
                    "fontFamily": {
                        "headline-md": ["Hanken Grotesk"],
                        "label-sm": ["Inter"],
                        "body-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "label-md": ["Inter"],

                        "headline-lg-mobile": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],

            },

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .admin-glow {
            box-shadow: 0 0 40px -10px rgba(79, 70, 229, 0.15);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="bg-surface font-body-md text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar Shell (Hidden nav since it's a login screen) -->
<header class="w-full top-0 border-b border-outline-variant bg-surface">
<div class="flex justify-between items-center h-16 px-md md:px-xl w-full max-w-7xl mx-auto">
<div class="font-headline-md text-headline-md font-bold text-primary">
                SecurityFlow
            </div>
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer active:opacity-70" data-icon="help_outline">help_outline</span>
</div>
</div>
</header>
<main class="flex-grow flex items-center justify-center p-md md:p-xl relative overflow-hidden">
<!-- Atmospheric Background Element -->
<div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary-container opacity-[0.03] rounded-full blur-[120px]"></div>
<div class="absolute top-[60%] left-[70%] w-[50%] h-[50%] bg-tertiary-container opacity-[0.02] rounded-full blur-[150px]"></div>
</div>
<!-- Admin Portal Access Card -->
<div class="w-full max-w-[440px] z-10">
<div class="bg-surface-container-lowest border border-outline-variant p-xl rounded-xl admin-glow glass-panel">
<!-- Branding & Title -->
<div class="mb-2xl text-center">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-primary mb-md">
<span class="material-symbols-outlined text-on-primary text-2xl" data-icon="admin_panel_settings">admin_panel_settings</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Admin Portal Access</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Authorized personnel only. Secure terminal.</p>
</div>
<!-- Form -->
<form class="space-y-lg" id="loginForm" onsubmit="handleLogin(event)">
<!-- Email Field -->
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant block" for="email">Administrator Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]" data-icon="alternate_email">alternate_email</span>
</div>
<input class="w-full pl-[44px] pr-md py-md bg-white border border-outline rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-md outline-none" id="email" name="email" placeholder="name@securityflow.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-sm">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Access Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]" data-icon="lock">lock</span>
</div>
<input class="w-full pl-[44px] pr-[44px] py-md bg-white border border-outline rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-md outline-none" id="password" name="password" placeholder="••••••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-md flex items-center text-on-surface-variant hover:text-primary transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility" id="passwordIcon">visibility</span>
</button>
</div>
</div>
<!-- Actions -->
<div class="pt-md">
<button class="w-full bg-primary hover:bg-on-primary-fixed-variant text-on-primary font-label-md text-label-md py-md rounded-lg shadow-sm active:scale-[0.98] transition-all flex items-center justify-center gap-sm" id="submitBtn" type="submit">
<span>Secure Login</span>
<span class="material-symbols-outlined text-[18px]" data-icon="login">login</span>
</button>
</div>
<!-- Security Indicator -->
<div class="flex items-center justify-center gap-xs pt-lg text-on-surface-variant opacity-60">
<span class="material-symbols-outlined text-[16px]" data-icon="verified_user">verified_user</span>
<span class="font-label-sm text-label-sm">End-to-End Encrypted Session</span>
</div>
</form>
</div>
<!-- Footer Links -->
<div class="mt-xl flex flex-col items-center gap-sm">
<p class="font-body-sm text-body-sm text-on-surface-variant text-center">
                    System ID: <span class="font-mono text-outline">SEC-FLOW-PRD-772</span>
</p>
<div class="flex gap-md">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary" href="#">Legal Compliance</a>
<span class="text-outline-variant">•</span>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary" href="#">Privacy Policy</a>
</div>
</div>
</div>
</main>
<!-- Side Graphic (Minimalist for Admin) -->
<div class="hidden lg:block fixed right-0 top-0 bottom-0 w-1/4 bg-surface-container-high border-l border-outline-variant">
<div class="h-full w-full flex flex-col items-center justify-center p-xl gap-xl opacity-40">
<div class="w-full h-px bg-outline-variant"></div>
<div class="flex flex-col gap-md w-full">
<div class="h-4 bg-outline-variant rounded-full w-3/4"></div>
<div class="h-4 bg-outline-variant rounded-full w-1/2"></div>
<div class="h-4 bg-outline-variant rounded-full w-2/3"></div>
</div>
<div class="w-full h-px bg-outline-variant"></div>
<img alt="Security" class="w-full rounded-xl grayscale mix-blend-multiply" data-alt="A clean, minimalist high-tech circuit board pattern with glowing cyan and deep blue lines on a stark white background. The composition is highly geometric and structured, conveying a sense of advanced digital security and precision engineering. The lighting is sharp and clinical, emphasizing the professional, utilitarian aesthetic of an administrative security dashboard." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDqJ36ixRUOHpPXQFvPQjaVP2oh3X5kwE-JPyfH11naokxrZt5vhFp6ZwMcsYvc454xlx6rZlza2cA_VW_TxKFCi6T1fBAoeUDEaqwKJ2Mi8EwS_ZCvwNBURhiUCF8kDxR2_R_hiiIoNcA9zEvZR12_se7rP7kylWZTJenrzvF6UrzzoyrmW_ruxV2z-3jmL8PFNdj4sgAPXV3qSfQ-ER5eSGz9KFUBTzj-FrFgouzTv5wPG9tCSwYQ2lBxCcKXxLZvsa0-zSTK-nc"/>
<div class="w-full h-px bg-outline-variant"></div>
<div class="flex flex-col gap-md w-full">
<div class="h-4 bg-outline-variant rounded-full w-1/4"></div>
<div class="h-4 bg-outline-variant rounded-full w-5/6"></div>
</div>
</div>
</div>
<script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('passwordIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        function handleLogin(event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalContent = btn.innerHTML;
            
            // Loading state
            btn.disabled = true;
            btn.innerHTML = `
                <div class="flex items-center gap-sm">
                    <svg class="animate-spin h-5 w-5 text-on-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewbox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span>Authenticating...</span>
                </div>
            `;

            // Simulate API call
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
                alert('In a real application, this would authenticate against the SecurityFlow API.');
            }, 1500);
        }
    </script>
</body></html>
