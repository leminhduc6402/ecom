<body class="bg-surface-bright text-on-surface font-body-md selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Top Navigation Anchor (As per Shared Components) -->
<header class="w-full top-0 bg-surface border-b border-outline-variant z-50">
<nav class="flex justify-between items-center h-16 px-md md:px-xl w-full max-w-7xl mx-auto">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">security</span>
<span class="font-headline-md text-headline-md font-bold text-primary">SecurityFlow</span>
</div>
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors cursor-pointer" data-icon="help_outline">help_outline</span>
</div>
</nav>
</header>
<main class="min-h-[calc(100vh-64px)] flex items-center justify-center relative overflow-hidden px-md py-xl">
<!-- Abstract Background Shapes -->
<div class="absolute top-[-10%] right-[-5%] w-96 h-96 bg-primary-container opacity-5 rounded-full blur-3xl float-animation"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-96 h-96 bg-secondary-container opacity-10 rounded-full blur-3xl float-animation" style="animation-delay: -2s;"></div>
<!-- Auth Card -->
<div class="w-full max-w-[480px] bg-white rounded-xl auth-card-shadow p-xl md:p-2xl relative z-10 transition-all duration-300">
<!-- Header Section -->
<div class="text-center mb-xl">
<div class="inline-flex items-center justify-center p-md bg-primary-fixed rounded-full mb-md">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">lock_open</span>
</div>
<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-xs">Welcome Back</h1>
<p class="text-on-surface-variant font-body-md">Log in to manage your workspace security.</p>
</div>
<!-- Login Form -->
<form class="space-y-lg" id="loginForm">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant block" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full pl-xl pr-md py-md bg-surface-container-low border-transparent border-2 rounded-lg focus:border-primary-container focus:bg-white focus:ring-0 transition-all font-body-md placeholder:text-outline" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant block" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full pl-xl pr-2xl py-md bg-surface-container-low border-transparent border-2 rounded-lg focus:border-primary-container focus:bg-white focus:ring-0 transition-all font-body-md placeholder:text-outline" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-md flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary py-[14px] text-white font-label-md rounded-full shadow-lg shadow-primary/20 hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all flex justify-center items-center gap-sm" id="submitBtn" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
<!-- Divider -->

<div class="flex-1 h-[1px] bg-outline-variant"></div>
<span class="font-label-sm text-label-sm text-outline uppercase tracking-wider">or continue with</span>
<div class="flex-1 h-[1px] bg-outline-variant"></div>
</div>
<!-- Google OAuth -->

<span class="font-label-md text-on-surface">Sign in with Google</span>
</button>

<!-- Footer Link -->
<div class="mt-xl text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Don't have an account?

</p>

<img class="w-full h-[480px] object-cover transition-transform duration-700 group-hover:scale-105" data-alt="A serene and futuristic high-tech security interface displayed on a clean white glass surface. The lighting is ethereal and soft, dominated by a gentle lavender and deep indigo color palette. Intricate digital encryption patterns and glowing lock icons float in a minimalist composition, conveying trust and sophisticated protection. The overall mood is modern, welcoming, and impeccably professional." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB5nUoEv2Ye6BL3C1Zi1wrfNBzBjUNG1BhivE-8zV8APrOc9L1-dR50hVeifyFf6tf5h1zmr92AvYoYZtDuIKI9vlaHIirkJRdaDo_Gl_1_orZqdV_e0XlTb-0o2K6nnhAedU93JScwMIet5VLwgqxNk90qFzh05vbXiS8HV2PS1503O_Lz4k2pbG47dw0c5i3Gg1WGrOCODMDSMM5t0iWeVS0_eTCgDjf8aEeg8aT4WEOA1zNZWNHnu0U0I0qHmkhvT_BDNngSVDc"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary/60 to-transparent flex flex-col justify-end p-xl">
<p class="text-white font-headline-md mb-xs">Enterprise Security</p>
<p class="text-on-primary-container/80 text-body-sm">Protecting over 2 million endpoints globally with zero-trust architecture.</p>
</div>
</div>
</div>
</main>
<script>
        // Micro-interactions for login state
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const originalContent = submitBtn.innerHTML;
            
            // Loading state animation
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            `;
            
            // Simulate API call
            setTimeout(() => {
                submitBtn.innerHTML = originalContent;
                submitBtn.disabled = false;
            }, 2000);
        });

        // Toggle password visibility
        const togglePassBtn = document.querySelector('button .material-symbols-outlined:contains("visibility")') || document.querySelector('button [data-icon="visibility"]') || document.querySelectorAll('button span')[1].parentElement;
        const passInput = document.getElementById('password');
        
        if(togglePassBtn) {
            togglePassBtn.addEventListener('click', () => {
                const icon = togglePassBtn.querySelector('.material-symbols-outlined');
                if(passInput.type === 'password') {
                    passInput.type = 'text';
                    icon.textContent = 'visibility_off';
                } else {
                    passInput.type = 'password';
                    icon.textContent = 'visibility';
                }
            });
        }
    </script>
</body></html>
