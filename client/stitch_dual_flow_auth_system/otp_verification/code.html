<body class="bg-surface-container-lowest min-h-screen flex flex-col font-body-md text-on-surface">
<!-- Header / Nav (Suppressed per task context: Task-Focused Journey) -->
<header class="w-full top-0 flex justify-between items-center h-16 px-md md:px-xl w-full max-w-7xl mx-auto border-b border-outline-variant">
<div class="font-headline-md text-headline-md font-bold text-primary">
            SecurityFlow

<div class="flex items-center gap-sm">
<button class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:bg-surface-variant p-2 rounded-full transition-all">help_outline</button>
</div>
</header>
<main class="flex-grow flex items-center justify-center p-md md:p-2xl bg-gradient-to-br from-surface-bright to-surface-container">
<!-- Main Verification Card -->
<div class="w-full max-w-[480px] glass-card rounded-xl p-xl shadow-[0_20px_40px_rgba(53,37,205,0.08)] border border-surface-variant transition-all animate-in fade-in zoom-in duration-500">
<div class="text-center mb-xl">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary-fixed mb-md">
<span class="material-symbols-outlined text-on-primary-fixed text-3xl">mark_email_read</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-sm">Verify Your Email</h1>
<p class="font-body-md text-on-surface-variant">We've sent a 6-digit code to your email.</p>
</div>
<!-- OTP Input Section -->
<form class="space-y-xl" id="otp-form">
<div class="flex justify-between gap-2 md:gap-4" id="otp-container">
<input class="otp-input w-12 h-14 md:w-14 md:h-16 text-center text-headline-md font-bold rounded-lg bg-surface-container border border-outline-variant focus:border-primary focus:ring-0 transition-all text-on-surface" data-index="0" maxlength="1" type="text"/>
<input class="otp-input w-12 h-14 md:w-14 md:h-16 text-center text-headline-md font-bold rounded-lg bg-surface-container border border-outline-variant focus:border-primary focus:ring-0 transition-all text-on-surface" data-index="1" maxlength="1" type="text"/>
<input class="otp-input w-12 h-14 md:w-14 md:h-16 text-center text-headline-md font-bold rounded-lg bg-surface-container border border-outline-variant focus:border-primary focus:ring-0 transition-all text-on-surface" data-index="2" maxlength="1" type="text"/>
<input class="otp-input w-12 h-14 md:w-14 md:h-16 text-center text-headline-md font-bold rounded-lg bg-surface-container border border-outline-variant focus:border-primary focus:ring-0 transition-all text-on-surface" data-index="3" maxlength="1" type="text"/>
<input class="otp-input w-12 h-14 md:w-14 md:h-16 text-center text-headline-md font-bold rounded-lg bg-surface-container border border-outline-variant focus:border-primary focus:ring-0 transition-all text-on-surface" data-index="4" maxlength="1" type="text"/>
<input class="otp-input w-12 h-14 md:w-14 md:h-16 text-center text-headline-md font-bold rounded-lg bg-surface-container border border-outline-variant focus:border-primary focus:ring-0 transition-all text-on-surface" data-index="5" maxlength="1" type="text"/>
</div>
<div class="space-y-md">
<button class="w-full bg-primary hover:bg-primary-container text-on-primary py-md rounded-lg font-label-md text-label-md transition-all active:scale-[0.98] shadow-lg shadow-primary/20" type="submit">
                        Verify
                    </button>
<div class="flex flex-col items-center gap-sm">
<button class="group font-label-md text-label-md text-outline cursor-not-allowed flex items-center gap-xs" disabled="" id="resend-btn" type="button">
                            Resend Code <span class="text-primary font-bold" id="timer">60s</span>
</button>
<p class="font-body-sm text-label-sm text-on-surface-variant">Didn't receive a code? Check your spam folder.</p>
</div>
</div>
</form>
</div>
</main>
<!-- Visual Atmosphere: Subtle Decorative Element -->
<div class="fixed bottom-0 left-0 w-full h-1/3 pointer-events-none opacity-40 mix-blend-multiply overflow-hidden z-[-1]">
<div class="absolute -bottom-24 -left-24 w-96 h-96 bg-primary-fixed blur-3xl rounded-full"></div>
<div class="absolute -bottom-48 right-1/4 w-[600px] h-[600px] bg-secondary-container blur-3xl rounded-full"></div>
</div>
<script>
        // OTP Focus Management
        const inputs = document.querySelectorAll('.otp-input');
        const form = document.getElementById('otp-form');
        const resendBtn = document.getElementById('resend-btn');
        const timerText = document.getElementById('timer');

        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // Simple Timer Logic
        let timeLeft = 60;
        const countdown = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(countdown);
                resendBtn.disabled = false;
                resendBtn.classList.remove('text-outline', 'cursor-not-allowed');
                resendBtn.classList.add('text-primary', 'cursor-pointer', 'hover:underline');
                timerText.textContent = '';
            } else {
                timeLeft--;
                timerText.textContent = `${timeLeft}s`;
            }
        }, 1000);

        // Form Submit Interaction
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            
            // Visual feedback
            btn.innerHTML = `<span class="inline-block animate-spin material-symbols-outlined">progress_activity</span>`;
            btn.disabled = true;

            setTimeout(() => {
                const otp = Array.from(inputs).map(i => i.value).join('');
                if(otp.length === 6) {
                    btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span> Verified`;
                    btn.classList.replace('bg-primary', 'bg-tertiary-container');
                } else {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    inputs.forEach(i => {
                        i.classList.add('border-error');
                        setTimeout(() => i.classList.remove('border-error'), 1000);
                    });
                }
            }, 1500);
        });

        // Resend Logic
        resendBtn.addEventListener('click', () => {
            if(!resendBtn.disabled) {
                alert("New code sent to your email!");
                // Reset timer or state here
            }
        });
    </script>
